<div class="container">

  <!-- HOME -->
  <div class="login-home login-tabs">

    <div class="login-home-header">
      <div class="login-kicker-row">
        <span class="login-kicker-line"></span>
        <span class="login-kicker">ACCESO AL LAUNCHER</span>
      </div>

      <h1 class="login-title">Iniciar sesión</h1>

      <p class="login-subtitle">
        Elige cómo quieres entrar al launcher.
      </p>
    </div>

    <div class="login-home-cards">

      <!-- PREMIUM -->
      <button class="connect connect-home connect-button-online login-card" type="button">
        <div class="login-card-icon premium-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3 14.6 8.2 20 9l-3.9 3.8.9 5.2L12 15.8 7 18l.9-5.2L4 9l5.4-.8L12 3Z"></path>
          </svg>
        </div>
        <span>Premium</span>
        <small>Microsoft / cuenta premium</small>
      </button>

      <!-- NO PREMIUM -->
      <button class="connect connect-home connect-button-offline login-card" type="button">
        <div class="login-card-icon offline-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="3.5"></circle>
            <path d="M5 19c1.7-3 4-4.5 7-4.5s5.3 1.5 7 4.5"></path>
          </svg>
        </div>
        <span>No Premium</span>
        <small>Acceso local / offline</small>
      </button>

    </div>

    <button class="cancel cancel-home" style="display: none" type="button">Cancelar</button>
  </div>

  <!-- LOGIN OFFLINE -->
  <div class="login-offline login-tabs">
    <div class="login-panel">
      <div class="login-panel-icon offline-panel-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="3.5"></circle>
          <path d="M5 19c1.7-3 4-4.5 7-4.5s5.3 1.5 7 4.5"></path>
        </svg>
      </div>

      <div class="login-text">Introduce un nombre de usuario</div>

      <div class="input-login">
        <input
          type="text"
          class="email email-offline"
          placeholder="Nombre de usuario"
        />
      </div>

      <div class="login-options">
        <button class="connect connect-offline" type="button">Acceder</button>
        <button class="cancel cancel-offline" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- LOGIN PREMIUM -->
  <div class="login-AZauth login-tabs">
    <div class="login-panel">
      <div class="login-panel-icon premium-panel-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3 14.6 8.2 20 9l-3.9 3.8.9 5.2L12 15.8 7 18l.9-5.2L4 9l5.4-.8L12 3Z"></path>
        </svg>
      </div>

      <div class="login-text">Inicia sesión para jugar.</div>

      <div class="input-login">
        <input type="text" class="email email-AZauth" placeholder="E-mail" />
        <input type="password" class="password password-AZauth" placeholder="Password" />
      </div>

      <div class="login-options">
        <button class="connect connect-AZauth" type="button">Confirmar</button>
        <button class="cancel cancel-AZauth" style="display: none" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- LOGIN A2F -->
  <div class="login-AZauth-A2F login-tabs">
    <div class="login-panel">
      <div class="login-panel-icon code-panel-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="5" width="16" height="14" rx="3"></rect>
          <path d="M8 10h8M8 14h5"></path>
        </svg>
      </div>

      <div class="login-text">Ingresa el código de seguridad.</div>

      <div class="input-login">
        <input type="text" class="A2F A2F-AZauth" placeholder="Code" />
      </div>

      <div class="login-options">
        <button class="connect connect-AZauth-A2F" type="button">Confirmar</button>
        <button class="cancel cancel-AZauth-A2F" type="button">Cancelar</button>
      </div>
    </div>
  </div>

</div>
